experiment_name: multi-agents-amc12-grpo-marti-COA
trial_name: trial0

seed: 1
enable_offload: false
total_train_epochs: 100
tokenizer_path: ${actor.path}

reward_fn_path: "areal.reward.amc12.amc12_mc_reward_fn"

cluster:
  n_nodes: 1
  n_gpus_per_node: 16
  fileroot: /path/to/experiments  # Please update this path to your local experiment directory
  name_resolve:
    type: nfs
    nfs_record_root: /path/to/name_resolve  # Please update this path to your local NFS record directory

allocation_mode: vllm:d8p1t1+d8p1t1

scheduler:
  type: local

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 256
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  openai:
    engine_max_tokens: 16384

gconfig:
  n_samples: 4
  min_new_tokens: 0
  max_tokens: 1600
  greedy: false
  temperature: 1.0
  top_k: 100000000
  top_p: 1.0

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /path/to/model/Qwen2.5-3B-Instruct  # Please update this path to your local model weights directory
  dtype: bfloat16
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  mb_spec:
    max_tokens_per_mb: 16384
  optimizer:
    type: adam
    lr: 1.0e-5
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 5.0
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  adv_norm:
    mean_level: batch
    std_level: batch
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars:
        VLLM_USE_V1: "1"
        VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
        HCCL_EXEC_TIMEOUT: "14400"
        HCCL_OP_EXPANSION_MODE: "HOST"
        ACL_DEVICE_SYNC_TIMEOUT: "14400"
        HCCL_EVENT_TIMEOUT: "14500"
        HCCL_ASYNC_ERROR_HANDLING: "0"
        ACL_STREAM_TIMEOUT: "14500000"
        HCCL_CONNECT_TIMEOUT: "7200"
        PYTORCH_NPU_ALLOC_CONF: "expandable_segments:True"
        HCCL_IF_BASE_PORT: "60000"
        HCCL_HOST_SOCKET_PORT_RANGE: "60000-60099"
        HCCL_NPU_SOCKET_PORT_RANGE: "60000-60099"


ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 10240
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 32768
  gpu_memory_utilization: 0.8
  enforce_eager: false

# datasets
train_dataset:
  batch_size: 256
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /path/to/data/amc12  # Please update this path to your local training dataset directory
  type: rl
  max_length: 1024

valid_dataset:
  batch_size: 256
  pin_memory: true
  num_workers: 4
  path: /path/to/data/amc12  # Please update this path to your local validation dataset directory
  type: rl

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  # SwanLab integration is optional and can be configured here
  # swanlab:
  #   project: areal-marl-project  # Please update by your need
  #   name: marti_COA_grpo_shared_math500
  #   mode: cloud
  #   api_key: PLS-FILL-UR-KEY

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false